<!DOCTYPE html>
<html lang="sr-Latn">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#2563EB">
    <title>Komšije</title>
    <style>
        :root {
            color-scheme: light;
            --komsije-primary: #2563eb;
            --komsije-dark: #0f172a;
            --komsije-background: #f8fafc;
            --komsije-border: #cbd5e1;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Inter, ui-sans-serif, system-ui, sans-serif;
            color: var(--komsije-dark);
            background:
                radial-gradient(circle at top, rgba(37, 99, 235, 0.18), transparent 34%),
                linear-gradient(180deg, #f8fafc 0%, #eef4ff 48%, #f8fafc 100%);
        }

        main {
            width: min(100%, 28rem);
            border: 1px solid rgba(203, 213, 225, 0.9);
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.94);
            padding: 28px;
            box-shadow: 0 18px 48px -24px rgba(15, 23, 42, 0.28);
            text-align: center;
        }

        .badge {
            width: 3.5rem;
            height: 3.5rem;
            margin: 0 auto 1rem;
            border-radius: 1.25rem;
            display: grid;
            place-items: center;
            background: var(--komsije-primary);
            color: #fff;
            font-size: 1.35rem;
            font-weight: 700;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        p {
            margin: 0.85rem 0 0;
            line-height: 1.6;
            color: #475569;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            margin-top: 1.5rem;
            padding: 0.875rem 1.25rem;
            border-radius: 999px;
            background: var(--komsije-primary);
            color: #fff;
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <main>
        <div class="badge">K</div>
        <h1>Trenutno ste van mreže</h1>
        <p>Komšije će prikazati sačuvan sadržaj kada je dostupan. Proverite vezu i pokušajte ponovo.</p>
        <a href="/">Pokušaj ponovo</a>
    </main>
</body>

</html>
