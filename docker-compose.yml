services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: upravnik_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db
    networks:
    - upravnik_network

  nginx:
    image: nginx:latest
    container_name: upravnik_nginx
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
    - upravnik_network

  db:
    image: mysql:8.0
    container_name: upravnik_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: upravnik
      MYSQL_USER: upravnik
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
    - upravnik_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: upravnik_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: upravnik
      PMA_PASSWORD: secret
    depends_on:
      - db
    networks:
    - upravnik_network

volumes:
  dbdata:

networks:
  upravnik_network:
